const KEY="ftrack_v5";
function loadState(){
  try{const r=localStorage.getItem(KEY);if(r){const p=JSON.parse(r);
    if(!p.investments)p.investments=[];if(!p.debts)p.debts=[];
    if(!p.savingsGoals)p.savingsGoals=[];if(!p.openingBalances)p.openingBalances={};
    if(!p.uploadHistory)p.uploadHistory=[];if(!p.netWorthHistory)p.netWorthHistory=[];
    if(!p.categories)p.categories=CATS;if(!p.invTypes)p.invTypes=INV_TYPES;
    if(!p.budgets)p.budgets={};if(!p.apiKey)p.apiKey="";
    return p;}}catch(e){}
  return{transactions:SEED,categories:CATS,invTypes:INV_TYPES,budgets:{},apiKey:"",
    investments:[],debts:[],savingsGoals:[],openingBalances:{},uploadHistory:[],netWorthHistory:[]};
}
function saveState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}

const fmt=n=>"N"+Number(n||0).toLocaleString("en-NG",{minimumFractionDigits:2,maximumFractionDigits:2});
const uid=()=>"u"+Date.now()+Math.random().toString(36).slice(2,6);
function sortMonths(ms){return[...ms].sort((a,b)=>{
  const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const pa=a.split(" "),pb=b.split(" ");
  const ya=parseInt(pa[pa.length-1]||"2026"),yb=parseInt(pb[pb.length-1]||"2026");
  const ma=mn.indexOf(pa[0].split("-")[0]),mb=mn.indexOf(pb[0].split("-")[0]);
  return ya!==yb?ya-yb:ma-mb;
});}
function calcMonth(txns,month){
  const rows=txns.filter(t=>t.month===month);
  const income=rows.filter(t=>t.cat==="income").reduce((s,t)=>s+t.amount,0);
  const byCat={};rows.filter(t=>t.cat!=="income").forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amount;});
  return{income,byCat,expenses:Object.values(byCat).reduce((s,v)=>s+v,0)};
}

// PASSWORD LOCK
function PasswordLock({onUnlock}){
  const[pw,setPw]=useState("");const[err,setErr]=useState("");
  const[setup,setSetup]=useState(!localStorage.getItem("ftrack_pw"));
  const[np,setNp]=useState("");const[cp,setCp]=useState("");
  function tryUnlock(){if(pw===localStorage.getItem("ftrack_pw"))onUnlock();else{setErr("Wrong password.");setPw("");}}
  function createPw(){if(np.length<4){setErr("Min 4 characters.");return;}if(np!==cp){setErr("Passwords do not match.");return;}localStorage.setItem("ftrack_pw",np);onUnlock();}
  const box={minHeight:"100vh",background:"#080814",display:"flex",alignItems:"center",justifyContent:"center",padding:20};
  const inner={background:"#111126",borderRadius:20,padding:36,width:"100%",maxWidth:360,border:"1px solid #252540",textAlign:"center"};
  if(setup)return h("div",{style:box},h("div",{style:inner},
    h("div",{style:{fontSize:36,marginBottom:10}},"🔐"),
    h("div",{style:{fontSize:17,fontWeight:800,color:"#fff",marginBottom:4}},"Create Your Password"),
    h("div",{style:{fontSize:11,color:"#64748b",marginBottom:20}},"Protects your finance tracker"),
    h("input",{type:"password",value:np,onChange:e=>{setNp(e.target.value);setErr("");},placeholder:"Create password (min 4)",style:{...S.inp,marginBottom:8,textAlign:"center"},onKeyDown:e=>e.key==="Enter"&&createPw()}),
    h("input",{type:"password",value:cp,onChange:e=>{setCp(e.target.value);setErr("");},placeholder:"Confirm password",style:{...S.inp,marginBottom:14,textAlign:"center"},onKeyDown:e=>e.key==="Enter"&&createPw()}),
    err&&h("div",{style:{fontSize:11,color:"#ef4444",marginBottom:10}},err),
    h("button",{onClick:createPw,style:{...S.btn(),width:"100%",padding:12}},"Set Password and Enter")
  ));
  return h("div",{style:box},h("div",{style:inner},
    h("div",{style:{fontSize:36,marginBottom:8}},"💰"),
    h("div",{style:{fontSize:9,letterSpacing:3,color:"#6366f1",fontWeight:700,textTransform:"uppercase",marginBottom:4}},"Oluwafunto Personal Finance"),
    h("div",{style:{fontSize:17,fontWeight:800,color:"#fff",marginBottom:4}},"Expense Tracker"),
    h("div",{style:{fontSize:11,color:"#64748b",marginBottom:24}},"Enter your password to continue"),
    h("input",{type:"password",value:pw,onChange:e=>{setPw(e.target.value);setErr("");},placeholder:"Password",autoFocus:true,style:{...S.inp,marginBottom:14,textAlign:"center",fontSize:16,letterSpacing:4},onKeyDown:e=>e.key==="Enter"&&tryUnlock()}),
    err&&h("div",{style:{fontSize:11,color:"#ef4444",marginBottom:10}},err),
    h("button",{onClick:tryUnlock,style:{...S.btn(),width:"100%",padding:12}},"Unlock"),
    h("div",{style:{fontSize:10,color:"#475569",marginTop:14}},"Cycle: 25th to 25th")
  ));
}

// AI CHAT
function AiChat({txns,cats,apiKey,onSaveKey}){
  const[msgs,setMsgs]=useState([{role:"ai",text:"Hi Oluwafunto! I can see all your financial data.\n\nAsk me anything about your spending, savings, or investments."}]);
  const[input,setInput]=useState("");const[loading,setLoading]=useState(false);
  const[history,setHistory]=useState([]);const[localKey,setLocalKey]=useState(apiKey||"");
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[msgs]);
  function buildCtx(){
    const months=sortMonths([...new Set(txns.map(t=>t.month))]);
    return months.map(mk=>{
      const{income,byCat,expenses}=calcMonth(txns,mk);const net=income-expenses;
      const lines=["\n== "+mk+" ==","Income:"+fmt(income)+" Expenses:"+fmt(expenses)+" Net:"+fmt(net)+" Savings:"+(income>0?((net/income)*100).toFixed(1):0)+"%"];
      cats.filter(c=>c.type==="expense").forEach(c=>{if(byCat[c.id])lines.push(" "+c.label+": "+fmt(byCat[c.id]));});
      return lines.join("\n");
    }).join("\n");
  }
  async function send(q){
    if(!q.trim())return;
    const key=localKey||apiKey;
    if(!key){setMsgs(m=>[...m,{role:"ai",text:"Please enter your Anthropic API key above."}]);return;}
    setInput("");setLoading(true);
    const newH=[...history,{role:"user",content:q}];
    setMsgs(m=>[...m,{role:"user",text:q},{role:"ai",text:"Thinking...",loading:true}]);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:900,
          system:"You are a personal finance advisor for Oluwafunto Motunrayo Falua, a Nigerian professional in Lagos. Give honest, specific, actionable advice. Use NGN. Reference actual numbers.\n\nDATA:"+buildCtx(),
          messages:newH})});
      const j=await res.json();if(j.error)throw new Error(j.error.message);
      const reply=(j.content||[]).map(i=>i.text||"").join("")||"No response.";
      setHistory([...newH,{role:"assistant",content:reply}]);
      setMsgs(m=>[...m.slice(0,-1),{role:"ai",text:reply}]);
    }catch(err){setMsgs(m=>[...m.slice(0,-1),{role:"ai",text:"Error: "+err.message}]);}
    setLoading(false);
  }
  const QUICK=["Where am I overspending?","Build me a budget","Savings rate?","Top 3 to cut","Analyse my spending","Financial risks?"];
  return h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:"#0b0b1e",borderLeft:"1px solid #1e1e38"}},
    h("div",{style:{padding:"12px 14px",borderBottom:"1px solid #1e1e38",background:"#111126",flexShrink:0}},
      h("div",{style:{fontSize:12,fontWeight:800,color:"#a5b4fc"}},"AI Finance Advisor"),
      h("div",{style:{fontSize:10,color:"#475569",marginTop:1}},"Powered by Claude"),
      !apiKey&&h("div",{style:{display:"flex",gap:6,marginTop:8}},
        h("input",{type:"password",placeholder:"Paste API key sk-ant",value:localKey,onChange:e=>setLocalKey(e.target.value),style:{...S.inp,fontSize:10,flex:1}}),
        h("button",{onClick:()=>onSaveKey(localKey),style:{...S.btn(),padding:"6px 12px",fontSize:11}},"Save")
      ),
      apiKey&&h("div",{style:{fontSize:10,color:"#10b981",marginTop:4}},"API key active")
    ),
    h("div",{style:{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}},
      ...msgs.map((m,i)=>h("div",{key:i,style:{maxWidth:"92%",alignSelf:m.role==="user"?"flex-end":"flex-start",padding:"9px 12px",borderRadius:12,fontSize:12,lineHeight:1.65,background:m.role==="user"?"#6366f1":"#1a1a38",color:m.role==="user"?"#fff":"#e2e8f0",border:m.role==="ai"?"1px solid #252540":"none",whiteSpace:"pre-wrap",wordBreak:"break-word"}},m.text)),
      h("div",{ref:bottomRef})
    ),
    h("div",{style:{padding:"10px 12px",borderTop:"1px solid #1e1e38",flexShrink:0}},
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}},
        ...QUICK.map(q=>h("span",{key:q,onClick:()=>send(q),style:{fontSize:10,padding:"3px 9px",background:"#1a1a38",border:"1px solid #252540",borderRadius:10,color:"#94a3b8",cursor:"pointer"}},q))
      ),
      h("div",{style:{display:"flex",gap:6}},
        h("textarea",{value:input,onChange:e=>setInput(e.target.value),rows:2,placeholder:"Ask about your finances",onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}},style:{...S.inp,resize:"none",lineHeight:1.5,flex:1}}),
        h("button",{onClick:()=>send(input),disabled:loading,style:{...S.btn(),opacity:loading?.5:1,padding:"8px 13px",alignSelf:"stretch"}},"Send")
      )
    )
  );
}

// UPLOAD TAB
function UploadTab({apiKey,cats,onConfirm}){
  const[status,setStatus]=useState(null);const[preview,setPreview]=useState(null);const[err,setErr]=useState("");
  async function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    if(!apiKey){setStatus("error");setErr("Save your API key in the AI Advisor panel first.");return;}
    const isPdf=file.type==="application/pdf",isImg=file.type.startsWith("image/");
    if(!isPdf&&!isImg){setStatus("error");setErr("Upload a PDF or image.");return;}
    setStatus("loading");setPreview(null);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const catList=cats.map(c=>c.id+"="+c.label).join(", ");
      const prompt="Analyze this Nigerian bank statement. Extract EVERY transaction.\n\nReturn ONLY valid JSON no markdown:\n{\"month\":\"Jun-Jul 2026\",\"transactions\":[{\"desc\":\"description\",\"amount\":4500,\"date\":\"01 Jul\",\"cat\":\"transportation\",\"source\":\"OPay\"}]}\n\nCategory IDs: "+catList+"\n\nRules: income=all credits. transportation=uber/tfare. travel=hotel/accommodation/airport. gifts_shopping=gifts to others. clothing_beauty=clothes/shoes/hair/nails/jewelry. food_dining=restaurants/delivery. church=offerings/tithes. utilities=electricity/NEPA. data_airtime=MTN data/airtime. health=hospital/pharmacy. loans_transfers=personal transfers out. car_auto=fuel/car parts. bank_charges=stamp duty/NIP fees/SMS alerts.";
      const content=[isPdf?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}:{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}];
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content}]})});
      const j=await res.json();if(j.error)throw new Error(j.error.message);
      const text=(j.content||[]).map(i=>i.text||"").join("")||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setPreview({month:parsed.month,txns:parsed.transactions.map(t=>({...t,id:uid(),month:parsed.month,amount:Number(t.amount)||0}))});
      setStatus("done");
    }catch(ex){setStatus("error");setErr(ex.message);}
    e.target.value="";
  }
  const byCat=preview?cats.filter(c=>c.type==="expense").map(c=>({...c,total:preview.txns.filter(t=>t.cat===c.id).reduce((s,t)=>s+t.amount,0)})).filter(c=>c.total>0):[];
  const income=preview?preview.txns.filter(t=>t.cat==="income").reduce((s,t)=>s+t.amount,0):0;
  return h("div",null,
    h("div",{style:{...S.card(""),textAlign:"center",border:"2px dashed #4f46e5"}},
      h("div",{style:{fontSize:30,marginBottom:8}},"Document"),
      h("div",{style:{fontSize:14,fontWeight:700,color:"#fff"}},"Upload Bank Statement"),
      h("div",{style:{fontSize:11,color:"#64748b",margin:"4px 0 14px"}},"Stanbic IBTC - OPay - GTBank - PDF or image"),
      h("label",{style:{display:"inline-block",padding:"9px 22px",background:"#6366f1",borderRadius:9,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},
        status==="loading"?"Analysing...":"Choose File",
        h("input",{type:"file",accept:".pdf,image/*",onChange:handleFile,style:{display:"none"},disabled:status==="loading"})
      ),
      h("div",{style:{fontSize:10,color:"#475569",marginTop:8}},"AI reads every transaction automatically")
    ),
    status==="loading"&&h("div",{style:{textAlign:"center",padding:22,color:"#a5b4fc",fontSize:12}},"Reading your statement... (20 to 40 seconds)"),
    status==="error"&&h("div",{style:{background:"#1a0808",border:"1px solid #ef4444",borderRadius:10,padding:12,color:"#fca5a5",fontSize:12,marginBottom:12}},"Error: "+err),
    status==="done"&&preview&&h("div",{style:{...S.card(""),border:"1px solid #10b981"}},
      h("div",{style:{fontSize:13,fontWeight:700,color:"#34d399",marginBottom:12}},preview.month+" - "+preview.txns.length+" transactions found"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        h("div",{style:{background:"#0d0d20",borderRadius:10,padding:11}},h("div",{style:{fontSize:10,color:"#64748b"}},"INCOME"),h("div",{style:{fontSize:15,fontWeight:800,color:"#10b981"}},fmt(income))),
        h("div",{style:{background:"#0d0d20",borderRadius:10,padding:11}},h("div",{style:{fontSize:10,color:"#64748b"}},"EXPENSES"),h("div",{style:{fontSize:15,fontWeight:800,color:"#ef4444"}},fmt(byCat.reduce((s,c)=>s+c.total,0))))
      ),
      ...byCat.map(c=>h("div",{key:c.id,style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1a1a38",fontSize:12}},h("span",null,c.label),h("span",{style:{fontWeight:700,color:c.color}},fmt(c.total)))),
      h("button",{onClick:()=>onConfirm(preview.txns),style:{...S.btn(),width:"100%",padding:11,fontSize:13,marginTop:14}},"Add "+preview.txns.length+" Transactions to Tracker")
    )
  );
}

// BACKUP TAB
function BackupTab({state,uploadHistory,onRestore}){
  const[msg,setMsg]=useState("");
  const lastBackup=localStorage.getItem("ftrack_last_backup");
  const daysSince=lastBackup?Math.floor((new Date()-new Date(lastBackup))/86400000):999;
  function doBackup(){
    const data={...state,_date:new Date().toISOString(),_v:"3.0"};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="finance-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
    localStorage.setItem("ftrack_last_backup",new Date().toISOString().slice(0,10));
    setMsg("Backup downloaded! Save it to Google Drive or email yourself.");
  }
  function doRestore(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!data.transactions)throw new Error("Invalid file");if(!confirm("Restore backup? This replaces all current data."))return;onRestore(data);setMsg("Restored! Refreshing...");setTimeout(()=>window.location.reload(),1000);}catch(err){setMsg("Invalid backup file.");}};
    r.readAsText(file);e.target.value="";
  }
  return h("div",null,
    daysSince>30&&h("div",{style:{background:"#1a1200",border:"1px solid #f59e0b40",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:11,color:"#fbbf24"}},(daysSince===999?"You have not backed up yet!":"Last backup "+daysSince+" days ago.")+" Back up your data now."),
    h("div",{style:S.card()},
      h("div",{style:{fontSize:13,fontWeight:700,color:"#a5b4fc",marginBottom:4}},"Backup Your Data"),
      h("div",{style:{fontSize:11,color:"#64748b",marginBottom:14}},"Downloads all transactions, investments, categories and settings as a JSON file. Save it to Google Drive or email yourself."),
      h("button",{onClick:doBackup,style:S.btn()},"Download Backup"),
      lastBackup&&h("div",{style:{fontSize:10,color:"#475569",marginTop:8}},"Last backup: "+lastBackup)
    ),
    h("div",{style:S.card()},
      h("div",{style:{fontSize:13,fontWeight:700,color:"#a5b4fc",marginBottom:4}},"Restore From Backup"),
      h("div",{style:{fontSize:11,color:"#64748b",marginBottom:14}},"Upload a previously downloaded backup file to restore all data."),
      h("label",{style:{display:"inline-block",padding:"8px 18px",background:"#1e1e3a",border:"1px solid #252540",borderRadius:8,color:"#94a3b8",fontWeight:700,fontSize:12,cursor:"pointer"}},
        "Choose Backup File",h("input",{type:"file",accept:".json",onChange:doRestore,style:{display:"none"}})
      )
    ),
    msg&&h("div",{style:{fontSize:12,fontWeight:600,padding:"10px 14px",borderRadius:8,marginBottom:14,color:msg.startsWith("Backup")?"#10b981":"#10b981",background:"#0a1a0a",border:"1px solid #10b98140"}},msg),
    uploadHistory.length>0&&h("div",{style:S.card()},
      h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:10}},"Upload History"),
      ...uploadHistory.map(h2=>h("div",{key:h2.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1a1a38"}},
        h("div",null,h("div",{style:{fontSize:12,color:"#e2e8f0",fontWeight:500}},h2.month),h("div",{style:{fontSize:10,color:"#64748b",marginTop:2}},h2.date+" at "+h2.time)),
        h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:11,fontWeight:700,color:"#10b981"}},h2.count+" transactions"),h2.dupes>0&&h("div",{style:{fontSize:9,color:"#f59e0b"}},h2.dupes+" duplicate(s) flagged"))
      ))
    )

// ANNUAL TAB
function AnnualTab({txns,cats}){
  const allMonths=[...new Set(txns.map(t=>t.month))];
  const years=[...new Set(allMonths.map(m=>m.split(" ").pop()||m.slice(-4)))].sort();
  const[year,setYear]=useState(years[years.length-1]||"2026");
  const yearMonths=allMonths.filter(m=>m.includes(year));
  const yearTxns=txns.filter(t=>yearMonths.includes(t.month));
  const income=yearTxns.filter(t=>t.cat==="income").reduce((s,t)=>s+t.amount,0);
  const expenses=yearTxns.filter(t=>t.cat!=="income").reduce((s,t)=>s+t.amount,0);
  const net=income-expenses;
  const byCat={};yearTxns.filter(t=>t.cat!=="income").forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amount;});
  const catMap=Object.fromEntries(cats.map(c=>[c.id,c]));

    h("div",{style:{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}},
      h("span",{style:{fontSize:11,color:"#64748b"}},"Year:"),

    ),
    yearMonths.length===0?h("div",{style:S.card()},h("div",{style:{textAlign:"center",color:"#475569",padding:24}},"No data for "+year+" yet."))

      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}},
        [{label:year+" Income",val:income,color:"#10b981"},{label:year+" Expenses",val:expenses,color:"#ef4444"},{label:year+" Net Savings",val:net,color:net>=0?"#6366f1":"#ef4444"},{label:"Avg Income Per Month",val:income/(yearMonths.length||1),color:"#f59e0b"}]
        .map(c=>h("div",{key:c.label,style:{...S.card(""),border:"1px solid "+c.color+"30",marginBottom:0}},h("div",{style:{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}},c.label),h("div",{style:{fontSize:16,fontWeight:800,color:c.color,marginTop:3}},fmt(Math.abs(c.val)))))
      ),
      h("div",{style:S.card()},
        h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}},"Top 5 Spending - "+year),
        ...top5.map(([catId,amt])=>{const cat=catMap[catId]||{label:catId,color:"#94a3b8"};const pct=expenses>0?(amt/expenses*100):0;
          return h("div",{key:catId,style:{marginBottom:10}},
            h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},h("span",{style:{fontSize:12,color:"#cbd5e1"}},cat.label),h("div",{style:{display:"flex",gap:10}},h("span",{style:{fontSize:10,color:"#64748b"}},pct.toFixed(1)+"%"),h("span",{style:{fontSize:12,fontWeight:700,color:cat.color}},fmt(amt)))),
            h("div",{style:{background:"#0a0a18",borderRadius:20,height:5}},h("div",{style:{height:"100%",borderRadius:20,width:pct+"%",background:cat.color}}))
          );
        })

        h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:12}},"Monthly Breakdown - "+year),

// HEALTH SCORE
function HealthScore({txns,month,investments,debts}){
  const{income,expenses}=calcMonth(txns,month);
  const net=income-expenses,savRate=income>0?(net/income*100):0;
  const hasInv=investments.length>0,totalDebt=debts.reduce((s,d)=>s+d.remaining,0);
  const mths=[...new Set(txns.map(t=>t.month))].length;
  const s1=Math.min(30,Math.max(0,savRate*1.5)),s2=hasInv?Math.min(25,investments.length*5):0;
  const s3=Math.max(0,20-(totalDebt>0&&income>0?(totalDebt/income)*5:0)),s4=Math.min(15,mths*3),s5=income>expenses?10:0;
  const total=Math.round(s1+s2+s3+s4+s5);
  const color=total>=80?"#10b981":total>=60?"#f59e0b":total>=40?"#f97316":"#ef4444";
  const grade=total>=80?"A":total>=70?"B":total>=60?"C":total>=40?"D":"F";
  const label=total>=80?"Excellent":total>=70?"Good":total>=60?"Fair":total>=40?"Needs Work":"Critical";
  return h("div",{style:S.card()},
    h("div",{style:{textAlign:"center",marginBottom:20}},
      h("div",{style:{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}},"Financial Health Score - "+month),
      h("div",{style:{fontSize:64,fontWeight:900,color,lineHeight:1}},total),
      h("div",{style:{fontSize:13,fontWeight:700,color,marginTop:4}},grade+" - "+label),
      h("div",{style:{background:"#0d0d20",borderRadius:20,height:10,margin:"12px auto",maxWidth:260,overflow:"hidden"}},h("div",{style:{height:"100%",borderRadius:20,width:total+"%",background:color}}))
    ),
    ...[
      {label:"Savings Rate",score:Math.round(s1),max:30,detail:savRate.toFixed(1)+"% saved, target 20%+"},
      {label:"Investment Activity",score:Math.round(s2),max:25,detail:hasInv?investments.length+" investments":"No investments yet"},
      {label:"Debt Management",score:Math.round(s3),max:20,detail:totalDebt>0?fmt(totalDebt)+" total debt":"No debts tracked"},
      {label:"Tracking Consistency",score:Math.round(s4),max:15,detail:mths+" months of data"},
      {label:"Spending Control",score:Math.round(s5),max:10,detail:income>expenses?"Within income":"Overspending"},
    ].map(c=>h("div",{key:c.label,style:{background:"#0d0d20",borderRadius:10,padding:"10px 14px",marginBottom:8}},
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:5}},h("span",{style:{fontSize:12,color:"#e2e8f0",fontWeight:600}},c.label),h("span",{style:{fontSize:12,fontWeight:800,color:c.score/c.max>=.7?"#10b981":c.score/c.max>=.4?"#f59e0b":"#ef4444"}},c.score+"/"+c.max)),
      h("div",{style:{background:"#1a1a38",borderRadius:20,height:5,marginBottom:4,overflow:"hidden"}},h("div",{style:{height:"100%",borderRadius:20,width:((c.score/c.max)*100)+"%",background:c.score/c.max>=.7?"#10b981":c.score/c.max>=.4?"#f59e0b":"#ef4444"}})),
      h("div",{style:{fontSize:10,color:"#64748b"}},c.detail)
    ))
  );
}

function BudgetTargets({cats,budgets,month,byCat,onUpdate,onClose}){

            h("div",{style:{fontSize:11,fontWeight:700,color:"#f59e0b",marginBottom:10}},"Top 3 Biggest Transactions This Cycle"),
            ...top3.map((t,i)=>{const cat=catMap[t.cat]||{color:"#94a3b8",label:t.cat};
              return h("div",{key:t.id,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"#0d0d20",borderRadius:8,marginBottom:6,border:"1px solid "+cat.color+"30"}},
                h("div",{style:{fontSize:16,fontWeight:900,color:i===0?"#f59e0b":i===1?"#94a3b8":"#cd7c2f",minWidth:20}},"#"+(i+1)),
                h("div",{style:{flex:1}},h("div",{style:{fontSize:11,color:"#e2e8f0",fontWeight:600}},t.desc),h("div",{style:{display:"flex",gap:8,marginTop:2}},h("span",{style:{fontSize:9,color:"#64748b"}},t.date),h("span",{style:S.tag(cat.color)},cat.label))),
                h("div",{style:{fontSize:13,fontWeight:800,color:cat.color}},fmt(t.amount))
              );
            })
          ),
          // Category breakdown
          h("div",{style:S.card()},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc"}},"Expense Breakdown - "+month),
              h("span",{style:{fontSize:10,color:"#475569"}},"Click to drill down")
            ),
            expCats.filter(c=>byCat[c.id]).length===0?h("div",{style:{textAlign:"center",color:"#475569",padding:20}},"No expense data. Upload a statement or add entries manually.")
            :[...expCats].sort((a,b)=>(byCat[b.id]||0)-(byCat[a.id]||0)).map(cat=>{
              const amt=byCat[cat.id]||0;if(!amt)return null;
              const pct=expenses>0?(amt/expenses*100):0;
              const count=txns.filter(t=>t.month===month&&t.cat===cat.id).length;
              return h("div",{key:cat.id,onClick:()=>setDrill(cat.id),style:{marginBottom:11,padding:"7px 9px",borderRadius:9,cursor:"pointer"},onMouseOver:e=>e.currentTarget.style.background="#0d0d20",onMouseOut:e=>e.currentTarget.style.background="transparent"},
                h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}},
                  h("div",{style:{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}},
                    h("span",{style:{fontSize:12,color:"#cbd5e1"}},cat.label),
                    h("span",{style:S.tag(cat.color)},count+" items"),
                    (budgets[cat.id]>0&&amt>budgets[cat.id])&&h("span",{style:S.tag("#ef4444")},"Over budget")
                  ),
                  h("div",{style:{display:"flex",gap:10,alignItems:"center"}},h("span",{style:{fontSize:10,color:"#64748b"}},pct.toFixed(1)+"%"),h("span",{style:{fontSize:12,fontWeight:700,color:cat.color}},fmt(amt)))
                ),
                h("div",{style:{background:"#0a0a18",borderRadius:20,height:5}},h("div",{style:{height:"100%",borderRadius:20,width:pct+"%",background:(budgets[cat.id]>0&&amt>budgets[cat.id])?"#ef4444":cat.color}})),
                (budgets[cat.id]>0)&&h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:3}},
                  h("div",{style:{background:"#0a0a18",borderRadius:20,height:3,flex:1,overflow:"hidden"}},
                    h("div",{style:{height:"100%",borderRadius:20,width:Math.min(100,(amt/(budgets[cat.id]||1))*100)+"%",background:amt>budgets[cat.id]?"#ef4444":"#10b981"}})),
                  h("span",{style:{fontSize:9,color:"#64748b",whiteSpace:"nowrap"}},amt>budgets[cat.id]?"Over budget!":"Budget: "+fmt(budgets[cat.id]))
                )
              );
            })
          )
        ),

        tab==="investments"&&h(InvestmentsTab,{investments:investments||[],savingsGoals:savingsGoals||[],invTypes:invTypes||INV_TYPES,onUpdateInv:inv=>persist({investments:inv}),onUpdateGoals:g=>persist({savingsGoals:g}),onUpdateTypes:t=>persist({invTypes:t})}),
        tab==="annual"&&h(AnnualTab,{txns,cats:cats||CATS}),
        tab==="trends"&&h("div",null,
          h("div",{style:S.card()},
            h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}},"Monthly Trend"),
            h("div",{style:{overflowX:"auto"}},
              h("div",{style:{display:"flex",gap:4,alignItems:"flex-end",minWidth:months.length*80,height:180,padding:"0 8px"}},
                ...months.map((mk,i)=>{const mc=calcMonth(txns,mk);const mnet=mc.income-mc.expenses;const maxV=Math.max(1,...months.map(m=>{const d=calcMonth(txns,m);return Math.max(d.income,d.expenses);}));
                  return h("div",{key:mk,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:70}},
                    h("div",{style:{fontSize:9,color:mnet>=0?"#10b981":"#ef4444",fontWeight:700,marginBottom:2}},(mnet>=0?"+":"")+fmt(mnet)),
                    h("div",{style:{display:"flex",gap:3,alignItems:"flex-end",height:140}},
                      h("div",{style:{width:16,height:Math.max(4,(mc.income/maxV)*140)+"px",background:"linear-gradient(180deg,#10b981,#059669)",borderRadius:"4px 4px 0 0"}}),
                      h("div",{style:{width:16,height:Math.max(4,(mc.expenses/maxV)*140)+"px",background:"linear-gradient(180deg,#ef4444,#dc2626)",borderRadius:"4px 4px 0 0"}})
                    ),
                    h("div",{style:{fontSize:8,color:"#64748b",marginTop:4,textAlign:"center",whiteSpace:"nowrap"}},mk)
                  );
                })
              ),
              h("div",{style:{display:"flex",gap:16,justifyContent:"center",marginTop:6}},
                h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#94a3b8"}},h("div",{style:{width:12,height:8,background:"#10b981",borderRadius:2}}),"Income"),
                h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#94a3b8"}},h("div",{style:{width:12,height:8,background:"#ef4444",borderRadius:2}}),"Expenses")
              )
            )
          ),
          h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}},"Month by Month Summary"),
          ...sortMonths(months).map(mk=>{const mc=calcMonth(txns,mk);const mnet=mc.income-mc.expenses;
            return h("div",{key:mk,style:S.card()},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},h("span",{style:{fontWeight:700,color:"#e2e8f0",fontSize:13}},mk),h("span",{style:{fontSize:12,fontWeight:700,color:mnet>=0?"#10b981":"#ef4444"}},"Net: "+fmt(mnet))),
              h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
                [{label:"INCOME",val:mc.income,color:"#10b981"},{label:"EXPENSES",val:mc.expenses,color:"#ef4444"}].map(x=>h("div",{key:x.label},h("div",{style:{fontSize:9,color:"#64748b",marginBottom:3}},x.label),h("div",{style:{background:"#0d0d20",borderRadius:7,height:24,overflow:"hidden"}},h("div",{style:{height:"100%",background:x.color,display:"flex",alignItems:"center",paddingLeft:8,width:"100%"}},h("span",{style:{fontSize:11,fontWeight:700,color:"#fff"}},fmt(x.val))))))
              )
            );
          })
        ),
        tab==="pivot"&&h("div",{style:S.card()},h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}},"Pivot Table - Coming Soon"),h("div",{style:{textAlign:"center",color:"#475569",padding:30}},"Pivot table feature available in the next update.")),
        tab==="upload"&&h(UploadTab,{apiKey,cats:cats||CATS,onConfirm:confirmUpload}),
        tab==="backup"&&h("div",null,
          h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}},"Backup and Restore"),
          h(BackupTab,{state,uploadHistory:uploadHistory||[],onRestore:data=>{const{_date,_v,...rest}=data;persist(rest);}}),
          h("div",{style:{marginTop:14}}),
          h("div",{style:{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:10}},"Financial Health Score"),
          h(HealthScore,{txns,month,investments:investments||[],debts:debts||[]})
        )
      ),
      // AI SIDEBAR
      h("div",{style:{width:310,flexShrink:0,overflow:"hidden",display:"flex",flexDirection:"column"}},
        h(AiChat,{txns,cats:cats||CATS,apiKey,onSaveKey:saveApiKey})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
