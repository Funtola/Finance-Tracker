const fmt=n=>"₦"+Number(n||0).toLocaleString("en-NG",{minimumFractionDigits:2,maximumFractionDigits:2});
const uid=()=>"u"+Date.now()+Math.random().toString(36).slice(2,7);
const sortMonths=ms=>[...ms].sort((a,b)=>new Date(`${a.split(" ")[0]} 1, ${a.split(" ")[1]}`)-new Date(`${b.split(" ")[0]} 1, ${b.split(" ")[1]}`));
const FUTURE_MONTHS=["Jun-Jul 2026","Jul-Aug 2026","Aug-Sep 2026","Sep-Oct 2026","Oct-Nov 2026","Nov-Dec 2026","Dec-Jan 2027","Jan-Feb 2027","Feb-Mar 2027"];
function calcMonth(txns,month){
  const rows=txns.filter(t=>t.month===month);
  const income=rows.filter(t=>t.cat==="income").reduce((s,t)=>s+t.amount,0);
  const byCat={};
  rows.filter(t=>t.cat!=="income").forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amount;});
  return{income,byCat,expenses:Object.values(byCat).reduce((s,v)=>s+v,0)};
}
const KEY="ftrack_v4";
function loadState(){
  try{
    const r=localStorage.getItem(KEY);
    if(r){
      const parsed=JSON.parse(r);
      // Merge any new default categories user doesn't have yet
      if(!parsed.categories)parsed.categories=DEFAULT_CATS;
      if(!parsed.budgets)parsed.budgets={};
      if(!parsed.apiKey)parsed.apiKey="";
      if(!parsed.investments)parsed.investments=[];
      if(!parsed.invTypes)parsed.invTypes=INV_TYPES;
      if(!parsed.savingsGoals)parsed.savingsGoals=[];
      if(!parsed.openingBalances)parsed.openingBalances={};
      if(!parsed.debts)parsed.debts=[];
      if(!parsed.netWorthHistory)parsed.netWorthHistory=[];
      if(!parsed.uploadHistory)parsed.uploadHistory=[];
      return parsed;
    }
  }catch(e){}
  // First visit only - load seed data
  return{transactions:SEED,categories:DEFAULT_CATS,budgets:{},apiKey:"",investments:[],savingsGoals:[],openingBalances:{},invTypes:INV_TYPES,debts:[],netWorthHistory:[],uploadHistory:[]};
}
function saveState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}

function ReclassifyModal({txn,cats,onSave,onClose}){

          <span style={{fontSize:10,color:"#64748b"}}>📅 {txn.date}</span>

function PivotTable({transactions,cats}){
  const months=sortMonths([...new Set(transactions.map(t=>t.month))]);
  const sources=[...new Set(transactions.map(t=>t.source))];
  const[rowDim,setRowDim]=useState("category");
  const[colDim,setColDim]=useState("month");
  const[pct,setPct]=useState(false);
  const[filter,setFilter]=useState("all");
  const txns=filter==="all"?transactions:transactions.filter(t=>t.cat===filter);
  const cols=colDim==="month"?months:sources;
  const rows=rowDim==="category"?cats.map(c=>({id:c.id,label:c.label,color:c.color})):sources.map(s=>({id:s,label:s,color:"#6366f1"}));
  const cell=(rId,cId)=>txns.filter(t=>(rowDim==="category"?t.cat===rId:t.source===rId)&&(colDim==="month"?t.month===cId:t.source===cId)).reduce((s,t)=>s+t.amount,0);
  const colTots=cols.map(c=>rows.reduce((s,r)=>s+cell(r.id,c),0));
  const rowTots=rows.map(r=>cols.reduce((s,c)=>s+cell(r.id,c),0));
  const grand=rowTots.reduce((s,v)=>s+v,0);
  const maxV=Math.max(1,...rows.flatMap(r=>cols.map(c=>cell(r.id,c))));
  const th={padding:"8px 10px",fontSize:10,fontWeight:700,color:"#64748b",textAlign:"right",background:"#0d0d20",borderBottom:"1px solid #1a1a38",whiteSpace:"nowrap"};
  const td=h=>({padding:"7px 10px",fontSize:11,textAlign:"right",fontWeight:600,color:h>.6?"#fff":h>.25?"#e2e8f0":"#475569",background:h>0?`rgba(99,102,241,${h*.3})`:"transparent",borderBottom:"1px solid #0d0d20"});
  return(
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:13,fontWeight:700,color:"#a5b4fc"}}>📊 Pivot Table</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <select value={rowDim} onChange={e=>setRowDim(e.target.value)} style={{...inp,width:"auto",fontSize:11}}>
            <option value="category">Rows: Category</option><option value="source">Rows: Bank</option>
          </select>
          <select value={colDim} onChange={e=>setColDim(e.target.value)} style={{...inp,width:"auto",fontSize:11}}>
            <option value="month">Cols: Month</option><option value="source">Cols: Bank</option>
          </select>
          <select value={filter} onChange={e=>setFilter(e.target.value)} style={{...inp,width:"auto",fontSize:11}}>
            <option value="all">All</option>{cats.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
          <Btn onClick={()=>setPct(v=>!v)} color={pct?"#6366f1":"#1a1a38"} textColor={pct?"#fff":"#94a3b8"}>{pct?"₦":"% "}</Btn>
        </div>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:400}}>
          <thead>
            <tr>
              <th style={{...th,textAlign:"left",minWidth:150}}>—</th>
              {cols.map((c,i)=><th key={c} style={th}>{c}<br/><span style={{color:"#475569",fontWeight:500,fontSize:9}}>{fmt(colTots[i])}</span></th>)}
              <th style={{...th,color:"#a5b4fc"}}>Total</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row,ri)=>{const rt=rowTots[ri];if(!rt)return null;return(
              <tr key={row.id}>
                <td style={{padding:"7px 10px",fontSize:11,fontWeight:600,borderBottom:"1px solid #0d0d20"}}><span style={{color:row.color||"#94a3b8"}}>{row.label}</span></td>
                {cols.map((c,ci)=>{const v=cell(row.id,c);const h=v/maxV;const disp=pct?(colTots[ci]>0?(v/colTots[ci]*100).toFixed(1)+"%":"—"):(v>0?fmt(v):"—");return <td key={c} style={td(h)}>{disp}</td>;})}
                <td style={{...td(0),color:"#a5b4fc",fontWeight:800}}>{pct?(grand>0?(rt/grand*100).toFixed(1)+"%":"—"):fmt(rt)}</td>
              </tr>
            );})}
          </tbody>
          <tfoot>
            <tr>
              <td style={{padding:"9px 10px",fontSize:11,fontWeight:800,color:"#a5b4fc",borderTop:"2px solid #252540"}}>TOTAL</td>
              {colTots.map((ct,i)=><td key={i} style={{padding:"9px 10px",textAlign:"right",fontSize:11,fontWeight:800,color:"#a5b4fc",borderTop:"2px solid #252540"}}>{fmt(ct)}</td>)}
              <td style={{padding:"9px 10px",textAlign:"right",fontSize:12,fontWeight:900,color:"#6366f1",borderTop:"2px solid #252540"}}>{fmt(grand)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </Card>
  );
}

function TrendChart({transactions}){
  const months=sortMonths([...new Set(transactions.map(t=>t.month))]);
  const data=months.map(mk=>{const{income,expenses}=calcMonth(transactions,mk);return{month:mk,income,expenses,net:income-expenses};});
  const maxVal=Math.max(1,...data.flatMap(d=>[d.income,d.expenses]));
  const H=140;
  return(
    <Card style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}}>📈 Monthly Trend</div>
      {data.length===0?<div style={{textAlign:"center",color:"#475569",padding:20}}>No data yet.</div>:(
        <div style={{overflowX:"auto"}}>
          <div style={{display:"flex",gap:4,alignItems:"flex-end",minWidth:data.length*90,height:H+50,padding:"0 8px"}}>
            {data.map((d,i)=>{
              const iH=Math.max(4,(d.income/maxVal)*H);
              const eH=Math.max(4,(d.expenses/maxVal)*H);
              return(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:80}}>
                  <div style={{fontSize:9,color:d.net>=0?"#10b981":"#ef4444",fontWeight:700,marginBottom:2}}>{d.net>=0?"+":""}{fmt(d.net)}</div>
                  <div style={{display:"flex",gap:3,alignItems:"flex-end",height:H}}>
                    <div style={{width:18,height:iH,background:"linear-gradient(180deg,#10b981,#059669)",borderRadius:"4px 4px 0 0"}} title={`Income: ${fmt(d.income)}`}/>
                    <div style={{width:18,height:eH,background:"linear-gradient(180deg,#ef4444,#dc2626)",borderRadius:"4px 4px 0 0"}} title={`Expenses: ${fmt(d.expenses)}`}/>
                  </div>
                  <div style={{fontSize:9,color:"#64748b",marginTop:4,textAlign:"center",whiteSpace:"nowrap"}}>{d.month}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#94a3b8"}}><div style={{width:12,height:8,background:"#10b981",borderRadius:2}}/> Income</div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#94a3b8"}}><div style={{width:12,height:8,background:"#ef4444",borderRadius:2}}/> Expenses</div>
          </div>
        </div>
      )}
    </Card>
  );
}

function ManageCategories({cats,onUpdate,onClose}){
  const[list,setList]=useState(cats.map(c=>({...c})));
  const[newCat,setNewCat]=useState({label:"",color:"#6366f1",type:"expense"});
  const[editId,setEditId]=useState(null);
  const COLORS=["#10b981","#f59e0b","#6366f1","#ec4899","#a855f7","#f97316","#14b8a6","#84cc16","#06b6d4","#ef4444","#8b5cf6","#d97706","#6b7280","#3b82f6","#e11d48","#0891b2","#7c3aed","#059669"];
  function addCat(){if(!newCat.label.trim())return;setList(l=>[...l,{...newCat,id:"cat_"+uid(),deletable:true}]);setNewCat({label:"",color:"#6366f1",type:"expense"});}
  function deleteCat(id){if(!confirm("Delete? Transactions will move to Other."))return;setList(l=>l.filter(c=>c.id!==id));}
  function updateField(id,field,val){setList(l=>l.map(c=>c.id===id?{...c,[field]:val}:c));}
  return(
    <Modal onClose={onClose} width={560}>
      <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:3}}>⚙️ Manage Categories</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:16}}>Add, rename, recolour, or remove categories</div>
      <div style={{background:"#0d0d20",borderRadius:10,padding:14,marginBottom:16,border:"1px solid #252540"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#a5b4fc",marginBottom:10}}>➕ Add New Category</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:8,alignItems:"center"}}>
          <input value={newCat.label} onChange={e=>setNewCat(v=>({...v,label:e.target.value}))} placeholder="e.g. School Fees, Rent, Business" style={inp}/>
          <select value={newCat.type} onChange={e=>setNewCat(v=>({...v,type:e.target.value}))} style={{...inp,width:"auto"}}>
            <option value="expense">Expense</option><option value="income">Income</option>
          </select>
          <input type="color" value={newCat.color} onChange={e=>setNewCat(v=>({...v,color:e.target.value}))} style={{width:36,height:34,border:"1px solid #252540",borderRadius:6,background:"#0d0d20",cursor:"pointer",padding:2}}/>
          <Btn onClick={addCat} style={{padding:"8px 12px"}}>+ Add</Btn>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:10}}>
          {COLORS.map(c=><div key={c} onClick={()=>setNewCat(v=>({...v,color:c}))} style={{width:22,height:22,borderRadius:4,background:c,cursor:"pointer",border:newCat.color===c?"2px solid #fff":"2px solid transparent"}}/>)}
        </div>
      </div>
      <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:8}}>Existing ({list.length})</div>
      <div style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:5}}>
        {list.map(cat=>(
          <div key={cat.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#0d0d20",borderRadius:8,border:`1px solid ${cat.color}30`}}>
            <div style={{width:14,height:14,borderRadius:3,background:cat.color,flexShrink:0}}/>
            {editId===cat.id?(
              <>
                <input value={cat.label} onChange={e=>updateField(cat.id,"label",e.target.value)} style={{...inp,flex:1,padding:"4px 8px",fontSize:11}}/>
                <input type="color" value={cat.color} onChange={e=>updateField(cat.id,"color",e.target.value)} style={{width:30,height:28,border:"none",background:"transparent",cursor:"pointer",padding:0}}/>
                <Btn onClick={()=>setEditId(null)} style={{padding:"4px 10px",fontSize:10}}>✓</Btn>
              </>
            ):(
              <>
                <span style={{flex:1,fontSize:12,color:"#e2e8f0"}}>{cat.label}</span>
                <span style={{fontSize:9,color:"#64748b",background:"#1a1a38",padding:"2px 6px",borderRadius:4}}>{cat.type}</span>
                <button onClick={()=>setEditId(cat.id)} style={{background:"transparent",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:13,padding:"0 4px"}}>✏️</button>

              </>
            )}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginTop:16}}>
        <Btn onClick={()=>onUpdate(list)}>💾 Save Changes</Btn>
        <Btn onClick={onClose} color="#1a1a38" textColor="#94a3b8">Cancel</Btn>
      </div>
    </Modal>
  );
}

function BudgetTargets({cats,budgets,month,byCat,onUpdate,onClose}){
  const[local,setLocal]=useState({...budgets});
  const expCats=cats.filter(c=>c.type==="expense");
  return(
    <Modal onClose={onClose} width={500}>
      <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:3}}>🎯 Budget Targets — {month}</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:16}}>Set a monthly spending limit per category. Leave 0 for no limit.</div>
      <div style={{maxHeight:420,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>
        {[...expCats].sort((a,b)=>(byCat[b.id]||0)-(byCat[a.id]||0)).map(cat=>{
          const spent=byCat[cat.id]||0;const budget=local[cat.id]||0;const over=budget>0&&spent>budget;const pct=budget>0?Math.min(100,(spent/budget)*100):0;
          return(
            <div key={cat.id} style={{background:"#0d0d20",borderRadius:10,padding:12,border:`1px solid ${over?"#ef444440":cat.color+"20"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>

                <span style={{fontSize:11,color:over?"#ef4444":"#64748b"}}>{fmt(spent)}{budget>0?` / ${fmt(budget)}`:""}</span>
                {over&&<span style={{fontSize:10,color:"#ef4444",fontWeight:700}}>⚠️ OVER</span>}
              </div>
              {budget>0&&<div style={{background:"#1a1a38",borderRadius:20,height:4,marginBottom:8,overflow:"hidden"}}><div style={{height:"100%",borderRadius:20,width:`${pct}%`,background:over?"#ef4444":"#10b981"}}/></div>}
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:10,color:"#64748b"}}>₦</span>
                <input type="number" value={local[cat.id]||""} onChange={e=>setLocal(v=>({...v,[cat.id]:Number(e.target.value)||0}))} placeholder="Set limit…" style={{...inp,fontSize:11,padding:"5px 9px"}}/>
                {local[cat.id]>0&&<button onClick={()=>setLocal(v=>({...v,[cat.id]:0}))} style={{background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:13}}>✕</button>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8,marginTop:16}}>
        <Btn onClick={()=>onUpdate(local)}>💾 Save Budgets</Btn>
        <Btn onClick={onClose} color="#1a1a38" textColor="#94a3b8">Cancel</Btn>
      </div>
    </Modal>
  );
}

function exportCSV(transactions,cats,month){
  const catMap=Object.fromEntries(cats.map(c=>[c.id,c]));
  const rows=month==="all"?transactions:transactions.filter(t=>t.month===month);
  const header=["Date","Month","Description","Category","Type","Amount (NGN)","Source"];
  const lines=[header.join(","),...rows.map(t=>[t.date,t.month,`"${t.desc.replace(/"/g,'""')}"`,catMap[t.cat]?.label||t.cat,catMap[t.cat]?.type||"expense",t.amount.toFixed(2),t.source].join(","))];
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`finance-${month.replace(/ /g,"_")}.csv`;a.click();
}

function InvestmentTracker({investments,savingsGoals,invTypes=INV_TYPES,onUpdate,onUpdateGoals,onUpdateInvTypes}){
  const[showAdd,setShowAdd]=useState(false);
  const[showGoal,setShowGoal]=useState(false);
  const[inv,setInv]=useState({type:"stocks",name:"",amount:"",currentValue:"",date:"",notes:"",month:"May-Jun 2026"});
  const[goal,setGoal]=useState({name:"",target:"",deadline:"",notes:""});
  const months=["May-Jun 2026","Jun-Jul 2026","Jul-Aug 2026","Aug-Sep 2026","Sep-Oct 2026","Oct-Nov 2026","Nov-Dec 2026","Dec-Jan 2027","Jan-Feb 2027","Feb-Mar 2027"];

  const totalInvested=investments.reduce((s,i)=>s+i.amount,0);
  const totalCurrentValue=investments.reduce((s,i)=>s+(i.currentValue||i.amount),0);
  const totalReturn=totalCurrentValue-totalInvested;
  const returnPct=totalInvested>0?(totalReturn/totalInvested*100):0;

  function addInvestment(){
    const amt=parseFloat(inv.amount);
    const cv=parseFloat(inv.currentValue)||amt;
    if(!inv.name.trim()||!amt||amt<=0)return;
    const newInv=[...investments,{...inv,id:uid(),amount:amt,currentValue:cv}];
    onUpdate(newInv);
    setInv({type:"stocks",name:"",amount:"",currentValue:"",date:"",notes:"",month:"May-Jun 2026"});
    setShowAdd(false);
  }

  function updateCurrentValue(id,val){
    onUpdate(investments.map(i=>i.id===id?{...i,currentValue:parseFloat(val)||i.amount}:i));
  }

  function deleteInv(id){
    if(confirm("Delete this investment?"))onUpdate(investments.filter(i=>i.id!==id));

    const t=parseFloat(goal.target);

function UploadTab({apiKey,cats,onConfirm}){

    const isPdf=file.type==="application/pdf",isImg=file.type.startsWith("image/");
    if(!isPdf&&!isImg){setStatus("error");setErr("Upload a PDF or image.");return;}
    setStatus("loading");setPreview(null);
    try{

      const catList=cats.map(c=>`${c.id}="${c.label}"`).join(", ");

      const content=[isPdf?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}:{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}];
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content}]})});
      const j=await res.json();if(j.error)throw new Error(j.error.message);

  const byCat=preview?cats.filter(c=>c.type==="expense").map(c=>({...c,total:preview.txns.filter(t=>t.cat===c.id).reduce((s,t)=>s+t.amount,0)})).filter(c=>c.total>0):[];
  const income=preview?preview.txns.filter(t=>t.cat==="income").reduce((s,t)=>s+t.amount,0):0;
  return(
    <div>
      <Card style={{textAlign:"center",border:"2px dashed #4f46e5",marginBottom:14}}>

        <label style={{display:"inline-block",padding:"9px 22px",background:"#6366f1",borderRadius:9,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
          {status==="loading"?"Analysing…":"Choose File"}

        </label>
        <div style={{fontSize:10,color:"#475569",marginTop:8}}>AI reads every transaction and categorises automatically</div>
      </Card>
      {status==="loading"&&<div style={{textAlign:"center",padding:22,color:"#a5b4fc",fontSize:12}}>🤖 Reading your statement… (20–40 seconds)</div>}
      {status==="error"&&<div style={{background:"#1a0808",border:"1px solid #ef4444",borderRadius:10,padding:12,color:"#fca5a5",fontSize:12,marginBottom:12}}>⚠️ {err}</div>}
      {status==="done"&&preview&&(
        <Card style={{border:"1px solid #10b981"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#34d399",marginBottom:12}}>✅ {preview.month} — {preview.txns.length} transactions found</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>

            <div style={{background:"#0d0d20",borderRadius:10,padding:11}}><div style={{fontSize:10,color:"#64748b"}}>EXPENSES</div><div style={{fontSize:15,fontWeight:800,color:"#ef4444"}}>{fmt(byCat.reduce((s,c)=>s+c.total,0))}</div></div>
          </div>

          <div key={i} style={{display:"flex",gap:10,marginBottom:6,fontSize:11,color:"#94a3b8"}}>
            <span style={{color:"#6366f1",fontWeight:700,minWidth:16}}>{i+1}.</span><span>{s}</span>

// ── BACKUP & RESTORE ─────────────────────────────────────────────────────────
function BackupRestore({state,onRestore}){
  const[msg,setMsg]=useState("");
  function doBackup(){
    const data={...state,_backup_date:new Date().toISOString(),_version:"2.0"};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`finance-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    setMsg("✅ Backup downloaded! Save this file somewhere safe.");
    localStorage.setItem("ftrack_last_backup",new Date().toISOString().slice(0,10));
  }
  function doRestore(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.transactions)throw new Error("Invalid backup file");
        if(!confirm(`Restore backup from ${data._backup_date?.slice(0,10)||"unknown date"}? This will replace all current data.`))return;
        onRestore(data);
        setMsg("✅ Data restored successfully!");
      }catch(err){setMsg("❌ Invalid backup file. Please use a valid .json backup.");}
    };
    r.readAsText(file);
    e.target.value="";
  }
  const lastBackup=localStorage.getItem("ftrack_last_backup");
  const daysSince=lastBackup?Math.floor((new Date()-new Date(lastBackup))/(1000*60*60*24)):999;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {daysSince>25&&(
        <div style={{background:"#2a1a00",border:"1px solid #f59e0b40",borderRadius:10,padding:"10px 14px",fontSize:11,color:"#fbbf24"}}>
          ⚠️ {daysSince===999?"You haven't backed up yet!": `Last backup was ${daysSince} days ago.`} Back up your data to avoid losing it.
        </div>
      )}
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:"#a5b4fc",marginBottom:4}}>💾 Backup Your Data</div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>Downloads all your transactions, investments, categories and settings as a JSON file. Keep it safe — on Google Drive, email it to yourself, or save to USB.</div>
        <Btn onClick={doBackup} style={{marginBottom:8}}>⬇️ Download Backup</Btn>
        {lastBackup&&<div style={{fontSize:10,color:"#475569",marginTop:6}}>Last backup: {lastBackup}</div>}
      </Card>
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:"#a5b4fc",marginBottom:4}}>📂 Restore From Backup</div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>Upload a previously downloaded backup file to restore all your data. Useful when switching laptops or browsers.</div>
        <label style={{display:"inline-block",padding:"8px 18px",background:"#1e1e3a",border:"1px solid #252540",borderRadius:8,color:"#94a3b8",fontWeight:700,fontSize:12,cursor:"pointer"}}>
          📂 Choose Backup File
          <input type="file" accept=".json" onChange={doRestore} style={{display:"none"}}/>
        </label>
      </Card>
      {msg&&<div style={{fontSize:12,color:msg.startsWith("✅")?"#10b981":"#ef4444",fontWeight:600,padding:"10px 14px",background:msg.startsWith("✅")?"#0a1a0a":"#1a0808",borderRadius:8,border:`1px solid ${msg.startsWith("✅")?"#10b98140":"#ef444440"}`}}>{msg}</div>}
    </div>
  );
}

// ── DEBT TRACKER ─────────────────────────────────────────────────────────────
function DebtTracker({debts=[],onUpdate}){
  const[showAdd,setShowAdd]=useState(false);
  const[d,setD]=useState({name:"",totalAmount:"",remaining:"",interestRate:"",dueDate:"",notes:""});
  function addDebt(){
    const ta=parseFloat(d.totalAmount),rem=parseFloat(d.remaining)||parseFloat(d.totalAmount);
    if(!d.name.trim()||!ta)return;
    onUpdate([...debts,{...d,id:uid(),totalAmount:ta,remaining:rem,interestRate:parseFloat(d.interestRate)||0}]);
    setD({name:"",totalAmount:"",remaining:"",interestRate:"",dueDate:"",notes:""});setShowAdd(false);
  }
  function updateRemaining(id,val){onUpdate(debts.map(db=>db.id===id?{...db,remaining:parseFloat(val)||0}:db));}
  function deleteDebt(id){if(confirm("Remove this debt?"))onUpdate(debts.filter(db=>db.id!==id));}
  const totalDebt=debts.reduce((s,db)=>s+db.remaining,0);
  const totalOriginal=debts.reduce((s,db)=>s+db.totalAmount,0);
  const paid=totalOriginal-totalDebt;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
        {[
          {label:"Total Debt",val:totalDebt,color:"#ef4444",icon:"💳"},
          {label:"Total Paid",val:paid,color:"#10b981",icon:"✅"},
          {label:"Original Debt",val:totalOriginal,color:"#f59e0b",icon:"📋"},
        ].map(c=>(
          <div key={c.label} style={{background:"#111126",borderRadius:14,padding:"14px 16px",border:`1px solid ${c.color}30`}}>
            <div style={{fontSize:14,marginBottom:4}}>{c.icon}</div>
            <div style={{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>{c.label}</div>
            <div style={{fontSize:16,fontWeight:800,color:c.color,marginTop:3}}>{fmt(c.val)}</div>
          </div>
        ))}
      </div>
      <Btn onClick={()=>setShowAdd(v=>!v)} style={{marginBottom:14}}>+ Add Debt</Btn>
      {showAdd&&(
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#a5b4fc",marginBottom:10}}>Add New Debt</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <input value={d.name} onChange={e=>setD(v=>({...v,name:e.target.value}))} placeholder="e.g. Car Loan, Personal Loan" style={inp}/>
            <input value={d.dueDate} onChange={e=>setD(v=>({...v,dueDate:e.target.value}))} placeholder="Due date e.g. Dec 2027" style={inp}/>
            <input value={d.totalAmount} onChange={e=>setD(v=>({...v,totalAmount:e.target.value}))} type="number" placeholder="Original amount (₦)" style={inp}/>
            <input value={d.remaining} onChange={e=>setD(v=>({...v,remaining:e.target.value}))} type="number" placeholder="Remaining balance (₦)" style={inp}/>
            <input value={d.interestRate} onChange={e=>setD(v=>({...v,interestRate:e.target.value}))} type="number" placeholder="Interest rate % (optional)" style={inp}/>
            <input value={d.notes} onChange={e=>setD(v=>({...v,notes:e.target.value}))} placeholder="Notes (optional)" style={inp}/>
          </div>
          <div style={{display:"flex",gap:8}}><Btn onClick={addDebt}>Add Debt</Btn><Btn onClick={()=>setShowAdd(false)} color="#1a1a38" textColor="#94a3b8">Cancel</Btn></div>
        </Card>
      )}
      {debts.length===0?(
        <Card><div style={{textAlign:"center",color:"#475569",padding:24}}><div style={{fontSize:28,marginBottom:8}}>💳</div>No debts tracked. Add debts to monitor repayment progress.</div></Card>
      ):debts.map(db=>{
        const pct=db.totalAmount>0?Math.min(100,((db.totalAmount-db.remaining)/db.totalAmount)*100):0;
        const paid=db.totalAmount-db.remaining;
        return(
          <Card key={db.id} style={{marginBottom:10,border:`1px solid #ef444425`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{db.name}</div>
                <div style={{display:"flex",gap:10,marginTop:3,flexWrap:"wrap"}}>
                  {db.dueDate&&<span style={{fontSize:10,color:"#64748b"}}>📅 Due: {db.dueDate}</span>}
                  {db.interestRate>0&&<span style={{fontSize:10,color:"#f59e0b"}}>📈 {db.interestRate}% interest</span>}
                  {db.notes&&<span style={{fontSize:10,color:"#64748b"}}>📝 {db.notes}</span>}
                </div>
              </div>
              <button onClick={()=>deleteDebt(db.id)} style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:13}}>🗑️</button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
              <span style={{color:"#10b981"}}>Paid: {fmt(paid)}</span>
              <span style={{color:"#ef4444",fontWeight:700}}>Remaining: {fmt(db.remaining)}</span>
              <span style={{color:"#64748b"}}>Original: {fmt(db.totalAmount)}</span>
            </div>
            <div style={{background:"#0a0a18",borderRadius:20,height:8,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",borderRadius:20,width:`${pct}%`,background:"linear-gradient(90deg,#10b981,#34d399)",transition:"width .5s"}}/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:10,color:"#64748b"}}>Update remaining: ₦</span>
              <input type="number" defaultValue={db.remaining} onBlur={e=>updateRemaining(db.id,e.target.value)}
                style={{...inp,width:130,padding:"4px 8px",fontSize:11}}/>
              <span style={{fontSize:10,color:"#10b981",fontWeight:700}}>{pct.toFixed(0)}% paid off</span>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

// ── NET WORTH TRACKER ────────────────────────────────────────────────────────
function NetWorthTracker({transactions,investments=[],debts=[],netWorthHistory=[],onUpdateHistory}){
  const[showAdd,setShowAdd]=useState(false);
  const[asset,setAsset]=useState({name:"",value:"",category:"property",date:""});
  const[assets,setAssets]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("ftrack_assets")||"[]");}catch(e){return[];}
  });
  function saveAssets(a){setAssets(a);localStorage.setItem("ftrack_assets",JSON.stringify(a));}
  function addAsset(){
    const v=parseFloat(asset.value);if(!asset.name.trim()||!v)return;
    saveAssets([...assets,{...asset,id:uid(),value:v}]);
    setAsset({name:"",value:"",category:"property",date:""});setShowAdd(false);
  }
  function deleteAsset(id){if(confirm("Remove this asset?"))saveAssets(assets.filter(a=>a.id!==id));}
  function updateAssetValue(id,val){saveAssets(assets.map(a=>a.id===id?{...a,value:parseFloat(val)||0}:a));}

  const totalAssets=assets.reduce((s,a)=>s+a.value,0)+investments.reduce((s,i)=>s+(i.currentValue||i.amount),0);
  const totalLiabilities=debts.reduce((s,d)=>s+d.remaining,0);
  const netWorth=totalAssets-totalLiabilities;

  function snapshotNetWorth(){
    const today=new Date().toISOString().slice(0,7);
    const newHistory=[...netWorthHistory.filter(h=>h.month!==today),{month:today,netWorth,assets:totalAssets,liabilities:totalLiabilities}];
    onUpdateHistory(newHistory);
    alert(`✅ Net worth snapshot saved for ${today}: ${fmt(netWorth)}`);
  }

  const ASSET_CATS=[
    {id:"property",label:"🏠 Property"},
    {id:"vehicle",label:"🚗 Vehicle"},
    {id:"cash",label:"💵 Cash / Savings"},
    {id:"business",label:"🏢 Business"},
    {id:"jewellery",label:"💍 Jewellery / Gold"},
    {id:"other_asset",label:"📦 Other Asset"},
  ];

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
        {[
          {label:"Total Assets",val:totalAssets,color:"#10b981",icon:"🏦"},
          {label:"Total Liabilities",val:totalLiabilities,color:"#ef4444",icon:"💳"},
          {label:"Net Worth",val:netWorth,color:netWorth>=0?"#6366f1":"#ef4444",icon:"💎"},
        ].map(c=>(
          <div key={c.label} style={{background:"#111126",borderRadius:14,padding:"14px 16px",border:`1px solid ${c.color}30`}}>
            <div style={{fontSize:14,marginBottom:4}}>{c.icon}</div>
            <div style={{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>{c.label}</div>
            <div style={{fontSize:16,fontWeight:800,color:c.color,marginTop:3}}>{fmt(Math.abs(c.val))}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <Btn onClick={()=>setShowAdd(v=>!v)}>+ Add Asset</Btn>
        <Btn onClick={snapshotNetWorth} color="#6366f1">📸 Save Snapshot</Btn>
      </div>
      {showAdd&&(
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#a5b4fc",marginBottom:10}}>Add Asset</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <input value={asset.name} onChange={e=>setAsset(v=>({...v,name:e.target.value}))} placeholder="e.g. House in Abule Egba" style={inp}/>
            <select value={asset.category} onChange={e=>setAsset(v=>({...v,category:e.target.value}))} style={inp}>
              {ASSET_CATS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
            <input value={asset.value} onChange={e=>setAsset(v=>({...v,value:e.target.value}))} type="number" placeholder="Current value (₦)" style={inp}/>
            <input value={asset.date} onChange={e=>setAsset(v=>({...v,date:e.target.value}))} placeholder="Date acquired e.g. Jan 2024" style={inp}/>
          </div>
          <div style={{display:"flex",gap:8}}><Btn onClick={addAsset}>Add Asset</Btn><Btn onClick={()=>setShowAdd(false)} color="#1a1a38" textColor="#94a3b8">Cancel</Btn></div>
        </Card>
      )}
      {/* Assets list */}
      {assets.length>0&&(
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:12}}>Your Assets</div>
          {assets.map(a=>(
            <div key={a.id} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1a1a38"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:"#e2e8f0",fontWeight:500}}>{a.name}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{ASSET_CATS.find(c=>c.id===a.category)?.label||a.category}{a.date&&` · Acquired ${a.date}`}</div>
              </div>
              <input type="number" defaultValue={a.value} onBlur={e=>updateAssetValue(a.id,e.target.value)}
                style={{...inp,width:130,padding:"4px 8px",fontSize:11,marginRight:8,color:"#10b981",fontWeight:700}}/>
              <button onClick={()=>deleteAsset(a.id)} style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12}}>🗑️</button>
            </div>
          ))}

// ── ANNUAL SUMMARY ───────────────────────────────────────────────────────────
function AnnualSummary({transactions,cats,investments=[]}){
  const allMonths=[...new Set(transactions.map(t=>t.month))];
  const years=[...new Set(allMonths.map(m=>m.split(" ").pop()||m.slice(-4)))].sort();
  const[year,setYear]=useState(years[years.length-1]||"2026");
  const yearMonths=allMonths.filter(m=>m.includes(year));
  const yearTxns=transactions.filter(t=>yearMonths.includes(t.month));
  const yearIncome=yearTxns.filter(t=>t.cat==="income").reduce((s,t)=>s+t.amount,0);
  const yearExpenses=yearTxns.filter(t=>t.cat!=="income").reduce((s,t)=>s+t.amount,0);
  const yearNet=yearIncome-yearExpenses;
  const yearInvested=investments.filter(i=>i.month&&i.month.includes(year)).reduce((s,i)=>s+i.amount,0);
  const byCat={};
  yearTxns.filter(t=>t.cat!=="income").forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amount;});
  const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const catMap=Object.fromEntries(cats.map(c=>[c.id,c]));
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#64748b"}}>Year:</span>
        {years.map(y=><Pill key={y} active={y===year} onClick={()=>setYear(y)}>{y}</Pill>)}
      </div>
      {yearMonths.length===0?(
        <Card><div style={{textAlign:"center",color:"#475569",padding:24}}>No data for {year} yet.</div></Card>
      ):(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {[
              {label:`${year} Total Income`,val:yearIncome,color:"#10b981",icon:"💰"},
              {label:`${year} Total Expenses`,val:yearExpenses,color:"#ef4444",icon:"💸"},
              {label:`${year} Net Savings`,val:yearNet,color:yearNet>=0?"#6366f1":"#ef4444",icon:"📊"},
              {label:`${year} Total Invested`,val:yearInvested,color:"#f59e0b",icon:"💼"},
            ].map(c=>(
              <div key={c.label} style={{background:"#111126",borderRadius:14,padding:"14px 16px",border:`1px solid ${c.color}30`}}>
                <div style={{fontSize:14,marginBottom:4}}>{c.icon}</div>
                <div style={{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>{c.label}</div>
                <div style={{fontSize:16,fontWeight:800,color:c.color,marginTop:3}}>{fmt(Math.abs(c.val))}</div>
                {c.label.includes("Income")&&<div style={{fontSize:10,color:"#475569",marginTop:2}}>Avg/month: {fmt(yearIncome/(yearMonths.length||1))}</div>}
              </div>
            ))}
          </div>
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}}>Top 5 Spending Categories — {year}</div>
            {topCats.map(([catId,amt])=>{
              const cat=catMap[catId]||{label:catId,color:"#94a3b8"};
              const pct=yearExpenses>0?(amt/yearExpenses*100):0;
              return(
                <div key={catId} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:12,color:"#cbd5e1"}}>{cat.label}</span>
                    <div style={{display:"flex",gap:10}}>
                      <span style={{fontSize:10,color:"#64748b"}}>{pct.toFixed(1)}%</span>
                      <span style={{fontSize:12,fontWeight:700,color:cat.color}}>{fmt(amt)}</span>
                    </div>
                  </div>
                  <div style={{background:"#0a0a18",borderRadius:20,height:5}}>
                    <div style={{height:"100%",borderRadius:20,width:`${pct}%`,background:cat.color}}/>

// ── FINANCIAL HEALTH SCORE ────────────────────────────────────────────────────
function HealthScore({transactions,month,investments=[],debts=[]}){
  const{income,expenses}=calcMonth(transactions,month);
  const net=income-expenses;
  const savingsRate=income>0?(net/income*100):0;
  const hasInvestments=investments.length>0;
  const totalDebt=debts.reduce((s,d)=>s+d.remaining,0);
  const debtToIncome=income>0?(totalDebt/income):0;
  const monthCount=[...new Set(transactions.map(t=>t.month))].length;

  // Score components (out of 100)
  const savingsScore=Math.min(30,Math.max(0,savingsRate*1.5));         // 30 pts: 20%+ = full
  const investScore=hasInvestments?Math.min(25,investments.length*5):0; // 25 pts
  const debtScore=Math.max(0,20-(debtToIncome*5));                     // 20 pts: no debt = full
  const consistencyScore=Math.min(15,monthCount*3);                    // 15 pts: 5+ months = full
  const budgetScore=expenses>0&&income>0?(income>expenses?10:0):5;     // 10 pts

  const total=Math.round(savingsScore+investScore+debtScore+consistencyScore+budgetScore);
  const color=total>=80?"#10b981":total>=60?"#f59e0b":total>=40?"#f97316":"#ef4444";
  const grade=total>=80?"A":total>=70?"B":total>=60?"C":total>=40?"D":"F";
  const label=total>=80?"Excellent 🌟":total>=70?"Good 👍":total>=60?"Fair 📈":total>=40?"Needs Work ⚠️":"Critical 🚨";

  const components=[
    {label:"Savings Rate",score:Math.round(savingsScore),max:30,detail:`${savingsRate.toFixed(1)}% saved (target 20%+)`},
    {label:"Investment Activity",score:Math.round(investScore),max:25,detail:hasInvestments?`${investments.length} active investment${investments.length!==1?"s":""}`:"No investments tracked yet"},
    {label:"Debt Management",score:Math.round(debtScore),max:20,detail:totalDebt>0?`${fmt(totalDebt)} total debt`:"No debts tracked"},
    {label:"Tracking Consistency",score:Math.round(consistencyScore),max:15,detail:`${monthCount} month${monthCount!==1?"s":""} of data`},
    {label:"Spending Control",score:Math.round(budgetScore),max:10,detail:income>expenses?"Spending within income":"Overspending this cycle"},
  ];

  return(
    <Card>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:11,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Financial Health Score — {month}</div>
        <div style={{fontSize:64,fontWeight:900,color,lineHeight:1}}>{total}</div>
        <div style={{fontSize:13,fontWeight:700,color,marginTop:4}}>{grade} · {label}</div>
        <div style={{background:"#0d0d20",borderRadius:20,height:10,margin:"14px auto",maxWidth:300,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:20,width:`${total}%`,background:`linear-gradient(90deg,${color},${color}88)`,transition:"width 1s"}}/>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {components.map(c=>(
          <div key={c.label} style={{background:"#0d0d20",borderRadius:10,padding:"10px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontSize:12,color:"#e2e8f0",fontWeight:600}}>{c.label}</span>
              <span style={{fontSize:12,fontWeight:800,color:c.score/c.max>=0.7?"#10b981":c.score/c.max>=0.4?"#f59e0b":"#ef4444"}}>{c.score}/{c.max}</span>
            </div>
            <div style={{background:"#1a1a38",borderRadius:20,height:5,marginBottom:5,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:20,width:`${(c.score/c.max)*100}%`,background:c.score/c.max>=0.7?"#10b981":c.score/c.max>=0.4?"#f59e0b":"#ef4444"}}/>
            </div>
            <div style={{fontSize:10,color:"#64748b"}}>{c.detail}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:14,padding:"12px 14px",background:"#0d1a0d",borderRadius:10,border:"1px solid #10b98130"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#10b981",marginBottom:6}}>💡 To improve your score:</div>
        {savingsRate<20&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>· Save at least 20% of income each cycle (currently {savingsRate.toFixed(1)}%)</div>}
        {!hasInvestments&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>· Add at least one investment to the Investments tab</div>}
        {totalDebt>0&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>· Work on reducing your debt of {fmt(totalDebt)}</div>}
        {monthCount<5&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>· Keep tracking consistently — you need {5-monthCount} more months of data</div>}
        {income<=expenses&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>· Your expenses exceed income this cycle — review your spending</div>}
        {total>=80&&<div style={{fontSize:10,color:"#10b981"}}>🌟 Excellent financial health! Keep it up.</div>}
      </div>
    </Card>
  );
}

// ── PASSWORD LOCK ─────────────────────────────────────────────────────────────
function PasswordLock({onUnlock}){
  const[pw,setPw]=useState("");
  const[error,setError]=useState("");
  const[setup,setSetup]=useState(false);
  const[newPw,setNewPw]=useState("");
  const[confirmPw,setConfirmPw]=useState("");
  const stored=localStorage.getItem("ftrack_pw");

  useEffect(()=>{if(!stored)setSetup(true);},[]);

  function tryUnlock(){
    if(pw===stored){setError("");onUnlock();}
    else{setError("Wrong password. Try again.");setPw("");}
  }

  function createPassword(){
    if(!newPw||newPw.length<4){setError("Password must be at least 4 characters.");return;}
    if(newPw!==confirmPw){setError("Passwords do not match.");return;}
    localStorage.setItem("ftrack_pw",newPw);
    onUnlock();
  }

  if(setup) return(
    <div style={{minHeight:"100vh",background:"#080814",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#111126",borderRadius:20,padding:36,width:"100%",maxWidth:380,border:"1px solid #252540",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔐</div>
        <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:4}}>Create Your Password</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:24}}>This protects your Finance Tracker from others</div>
        <input type="password" value={newPw} onChange={e=>{setNewPw(e.target.value);setError("");}}
          placeholder="Create a password (min 4 characters)" style={{...inp,marginBottom:10,textAlign:"center",fontSize:14}}
          onKeyDown={e=>e.key==="Enter"&&createPassword()}/>
        <input type="password" value={confirmPw} onChange={e=>{setConfirmPw(e.target.value);setError("");}}
          placeholder="Confirm password" style={{...inp,marginBottom:16,textAlign:"center",fontSize:14}}
          onKeyDown={e=>e.key==="Enter"&&createPassword()}/>
        {error&&<div style={{fontSize:11,color:"#ef4444",marginBottom:12}}>{error}</div>}
        <Btn onClick={createPassword} style={{width:"100%",padding:12,fontSize:14}}>🔒 Set Password & Enter</Btn>
        <div style={{fontSize:10,color:"#475569",marginTop:12}}>You can change your password later in Settings</div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#080814",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#111126",borderRadius:20,padding:36,width:"100%",maxWidth:380,border:"1px solid #252540",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>💰</div>
        <div style={{fontSize:10,letterSpacing:3,color:"#6366f1",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Oluwafunto · Personal Finance</div>
        <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:4}}>Expense Tracker</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:28}}>Enter your password to continue</div>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setError("");}}
          placeholder="Enter password" style={{...inp,marginBottom:16,textAlign:"center",fontSize:16,letterSpacing:4}}
          autoFocus onKeyDown={e=>e.key==="Enter"&&tryUnlock()}/>
        {error&&<div style={{fontSize:11,color:"#ef4444",marginBottom:12}}>{error}</div>}
        <Btn onClick={tryUnlock} style={{width:"100%",padding:13,fontSize:14}}>🔓 Unlock</Btn>
        <div style={{fontSize:10,color:"#475569",marginTop:16}}>Cycle: 25th – 25th every month</div>
      </div>
    </div>
  );
}

  const[drill,setDrill]=useState(null);
  const[unlocked,setUnlocked]=useState(()=>sessionStorage.getItem('ftrack_unlocked')==='1');
  const[darkMode,setDarkMode]=useState(true);
  const[showMan,setShowMan]=useState(false);
  const[showSearch,setShowSearch]=useState(false);
  const[showCats,setShowCats]=useState(false);
  const[showBudget,setShowBudget]=useState(false);
  const[exportMonth,setExportMonth]=useState("all");
  const[man,setMan]=useState({cat:"food_dining",desc:"",amount:"",date:"",month:"May-Jun 2026",source:"Manual"});
  const months=sortMonths([...new Set(transactions.map(t=>t.month))]);
  const allMonths=[...new Set([...months,...FUTURE_MONTHS])];
  const{income,byCat,expenses}=calcMonth(transactions,month);
  const net=income-expenses;
  const expCats=cats.filter(c=>c.type==="expense");

  function persist(u){const n={...state,...u};setState(n);saveState(n);}
  function reclassify(id,nc){persist({transactions:transactions.map(t=>t.id===id?{...t,cat:nc}:t)});}
  function deleteTxn(id){persist({transactions:transactions.filter(t=>t.id!==id)});}
  function addMan(){
    const amt=parseFloat(man.amount);
    if(!man.desc.trim()||!amt||amt<=0)return;
    persist({transactions:[...transactions,{...man,id:uid(),amount:amt}]});
    setMan(m=>({...m,desc:"",amount:"",date:""}));setShowMan(false);setMonth(man.month);
  }
  function confirmUpload(txns,skipDupes=false){
    // Duplicate detection
    const dupes=txns.filter(newT=>transactions.some(existing=>
      existing.month===newT.month&&
      Math.abs(existing.amount-newT.amount)<0.01&&
      existing.desc.toLowerCase().trim()===newT.desc.toLowerCase().trim()
    ));
    if(dupes.length>0&&!skipDupes){
      const msg=`⚠️ Found ${dupes.length} possible duplicate transaction${dupes.length!==1?"s":""}:

${dupes.slice(0,5).map(d=>`· ${d.desc} — ${fmt(d.amount)} (${d.date})`).join("
")}${dupes.length>5?`
...and ${dupes.length-5} more`:""}

Click OK to add anyway, Cancel to skip duplicates.`;
      if(!confirm(msg)){
        txns=txns.filter(newT=>!transactions.some(existing=>
          existing.month===newT.month&&
          Math.abs(existing.amount-newT.amount)<0.01&&
          existing.desc.toLowerCase().trim()===newT.desc.toLowerCase().trim()
        ));
      }
    }
    // Log upload history
    const histEntry={
      id:uid(),
      date:new Date().toLocaleDateString("en-NG"),
      time:new Date().toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"}),
      month:txns[0]?.month||"Unknown",
      count:txns.length,
      dupes:dupes.length,
    };
    persist({transactions:[...transactions,...txns],uploadHistory:[histEntry,...uploadHistory].slice(0,50)});
    if(txns.length)setMonth(txns[0].month);
    setTab("dashboard");
  }
  function updateInvestments(inv){persist({investments:inv});}
  function updateInvTypes(types){persist({invTypes:types});}
  function updateDebts(d){persist({debts:d});}
  function updateNetWorthHistory(h){persist({netWorthHistory:h});}
  function restoreBackup(data){
    const{_backup_date,_version,...rest}=data;
    persist(rest);
    alert("✅ Data restored successfully! Refreshing...");
    setTimeout(()=>window.location.reload(),1000);
  }
  function updateSavingsGoals2(goals){persist({savingsGoals:goals});}
  function carryForwardBalance(fromMonth,toMonth,amount){
    const newOB={...openingBalances,[toMonth]:amount};
    persist({openingBalances:newOB});
  }
  function getOpeningBalance(m){return openingBalances[m]||0;}
  function updateSavingsGoals(goals){persist({savingsGoals:goals});}
  function saveApiKey(k){persist({apiKey:k.trim()});}
  function updateCats(newCats){
    const ids=new Set(newCats.map(c=>c.id));
    const fixed=transactions.map(t=>ids.has(t.cat)?t:{...t,cat:"other"});
    persist({categories:newCats,transactions:fixed});setShowCats(false);
  }
  function updateBudgets(b){persist({budgets:b});setShowBudget(false);}

  const TABS=[{id:"dashboard",label:"📊 Dashboard"},{id:"investments",label:"💼 Investments"},{id:"annual",label:"📅 Annual"},{id:"networth",label:"💎 Net Worth"},{id:"trends",label:"📈 Trends"},{id:"pivot",label:"🔢 Pivot"},{id:"upload",label:"⬆️ Upload"},{id:"backup",label:"💾 Backup"}];

  return(

      {showSearch&&<SearchPanel transactions={transactions} cats={cats} onReclassify={reclassify} onDelete={deleteTxn} onClose={()=>setShowSearch(false)}/>}

      <div style={{background:"linear-gradient(135deg,#0f0f28,#161638)",borderBottom:"1px solid #1e1e3a",padding:"11px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"sticky",top:0,zIndex:100,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:9,letterSpacing:3,color:"#6366f1",fontWeight:700,textTransform:"uppercase"}}>Oluwafunto · Personal Finance · Cycle: 25th–25th</div>
          <div style={{fontSize:15,fontWeight:800,color:"#fff",marginTop:1}}>Expense Tracker</div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>

          <button onClick={()=>setShowSearch(true)} title="Search transactions" style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,background:"#1a1a38",color:"#94a3b8",fontFamily:"inherit"}}>🔍</button>
          <button onClick={()=>setShowCats(true)} style={{padding:"6px 11px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,background:"#1a1a38",color:"#94a3b8",fontFamily:"inherit"}}>⚙️ Categories</button>
          <button onClick={()=>{const np=prompt("Enter new password (min 4 chars):");if(np&&np.length>=4){const cp=prompt("Confirm new password:");if(cp===np){localStorage.setItem("ftrack_pw",np);alert("✅ Password updated!");}}else if(np){alert("Password must be at least 4 characters.");}}} style={{padding:"6px 11px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,background:"#1a1a38",color:"#94a3b8",fontFamily:"inherit"}}>🔑 Password</button>
          <button onClick={()=>{sessionStorage.removeItem('ftrack_unlocked');window.location.reload();}} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,background:"#2a0a0a",color:"#ef4444",fontFamily:"inherit"}}>🔒 Lock</button>
          <button onClick={()=>{if(confirm("⚠️ RESET ALL DATA? This cannot be undone! All your transactions, investments and settings will be deleted.")){localStorage.removeItem(KEY);localStorage.removeItem("ftrack_pw");sessionStorage.removeItem("ftrack_unlocked");window.location.reload();}}} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:10,background:"#1a1a38",color:"#475569",fontFamily:"inherit"}}>🗑️ Reset</button>
          <button onClick={()=>alert("Dark mode is the default. Light mode coming soon!")} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,background:"#1a1a38",color:"#94a3b8",fontFamily:"inherit"}}>🌙</button>
        </div>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 53px)"}}>
        <div style={{flex:1,overflowY:"auto",padding:"16px 18px 20px 20px"}}>

          {tab==="dashboard"&&(
            <div>
              {drill&&<DrilldownPanel catId={drill} month={month} transactions={transactions} cats={cats} onReclassify={reclassify} onDelete={deleteTxn} onClose={()=>setDrill(null)}/>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>
                <span style={{fontSize:10,color:"#64748b"}}>Month:</span>
                {months.map(mk=><Pill key={mk} active={mk===month} onClick={()=>setMonth(mk)}>{mk}</Pill>)}
                <div style={{marginLeft:"auto",display:"flex",gap:5}}>
                  <button onClick={()=>setShowBudget(true)} style={{padding:"5px 11px",borderRadius:8,border:"1px solid #252540",background:"transparent",color:"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>🎯 Budgets</button>
                  <button onClick={()=>exportCSV(transactions,cats,month)} style={{padding:"5px 11px",borderRadius:8,border:"1px solid #252540",background:"transparent",color:"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>📤 Export</button>
                  <button onClick={()=>printReport(month,income,expenses,net,byCat,cats)} style={{padding:"5px 11px",borderRadius:8,border:"1px solid #252540",background:"transparent",color:"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>🖨️ Print</button>
                  <Pill active={false} onClick={()=>setShowMan(v=>!v)}>+ Add Entry</Pill>
                </div>
              </div>

              {showMan&&(
                <Card style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#a5b4fc",marginBottom:10}}>Add Manual Transaction</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                    <select value={man.cat} onChange={e=>setMan(v=>({...v,cat:e.target.value}))} style={inp}>{cats.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select>
                    <select value={man.month} onChange={e=>setMan(v=>({...v,month:e.target.value}))} style={inp}>{allMonths.map(m=><option key={m} value={m}>{m}</option>)}</select>

                    <input value={man.desc} onChange={e=>setMan(v=>({...v,desc:e.target.value}))} placeholder="Description" style={{...inp,gridColumn:"span 2"}}/>
                    <input value={man.amount} onChange={e=>setMan(v=>({...v,amount:e.target.value}))} type="number" placeholder="Amount (₦)" style={inp}/>
                    <input value={man.date} onChange={e=>setMan(v=>({...v,date:e.target.value}))} placeholder="Date e.g. 12 Jul" style={inp}/>

                    <div style={{fontSize:14,marginBottom:4}}>{c.icon}</div>
                    <div style={{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>{c.label}</div>
                    <div style={{fontSize:18,fontWeight:800,color:c.color,marginTop:3}}>{fmt(c.val)}</div>
                    {c.hint&&<div style={{fontSize:9,color:"#475569",marginTop:3}}>{c.hint}</div>}
                  </div>
                ))}
              </div>

              {/* Backup reminder */}
              {(()=>{const lb=localStorage.getItem("ftrack_last_backup");const days=lb?Math.floor((new Date()-new Date(lb))/(86400000)):999;return days>30&&(<div onClick={()=>setTab("backup")} style={{background:"#1a1200",border:"1px solid #f59e0b40",borderRadius:8,padding:"8px 14px",marginBottom:10,fontSize:11,color:"#fbbf24",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>⚠️ {days===999?"Back up your data before you lose it!": `Last backup ${days} days ago — consider backing up`}</span><span style={{fontSize:10,color:"#f59e0b"}}>Go to Backup →</span></div>);})()}

              {/* Running total across all months */}
              {(()=>{
                const allIncome=transactions.filter(t=>t.cat==="income").reduce((s,t)=>s+t.amount,0);
                const allExpenses=transactions.filter(t=>t.cat!=="income").reduce((s,t)=>s+t.amount,0);
                const allNet=allIncome-allExpenses;
                if(months.length<=1)return null;
                return(
                  <div style={{background:darkMode?"#0d0d20":"#f8fafc",border:`1px solid ${darkMode?"#252540":"#e2e8f0"}`,borderRadius:10,padding:"10px 14px",marginBottom:10,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                    <div><div style={{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>All-Time Income</div><div style={{fontSize:14,fontWeight:800,color:"#10b981",marginTop:2}}>{fmt(allIncome)}</div></div>
                    <div><div style={{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>All-Time Expenses</div><div style={{fontSize:14,fontWeight:800,color:"#ef4444",marginTop:2}}>{fmt(allExpenses)}</div></div>
                    <div><div style={{fontSize:9,color:"#64748b",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>All-Time Net</div><div style={{fontSize:14,fontWeight:800,color:allNet>=0?"#6366f1":"#ef4444",marginTop:2}}>{fmt(allNet)}</div></div>
                  </div>
                );
              })()}
              {/* Opening Balance Banner */}
              {getOpeningBalance(month)>0&&(
                <div style={{background:"#0d1f0d",border:"1px solid #10b98140",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Opening Balance from previous cycle</div>
                    <div style={{fontSize:16,fontWeight:800,color:"#10b981",marginTop:2}}>{fmt(getOpeningBalance(month))}</div>
                  </div>
                  <div style={{fontSize:11,color:"#10b981",fontWeight:600}}>✓ Carried forward</div>
                </div>
              )}

              {income>0&&(
                <Card style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>Savings Rate</span>
                    <span style={{fontSize:11,fontWeight:700,color:net>=0?"#10b981":"#ef4444"}}>{(net/income*100).toFixed(1)}%</span>
                  </div>
                  <div style={{background:"#0d0d20",borderRadius:20,height:7,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:20,width:`${Math.min(100,Math.max(0,net/income*100))}%`,background:net>=0?"linear-gradient(90deg,#10b981,#34d399)":"#ef4444"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:"#475569"}}>
                    <span>💡 Target: 20%+ savings rate</span>
                    {Object.values(budgets).some(v=>v>0)&&<span style={{color:"#a5b4fc",cursor:"pointer"}} onClick={()=>setShowBudget(true)}>🎯 {Object.values(budgets).filter(v=>v>0).length} budget targets active</span>}
                  </div>
                  {net>0&&months.length>0&&(()=>{
                    const nextIdx=months.indexOf(month)+1;
                    const nextMonth=nextIdx<months.length?months[nextIdx]:FUTURE_MONTHS[0];
                    return(
                      <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1e1e38",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:10,color:"#64748b"}}>Carry ₦{fmt(net)} forward to {nextMonth}?</div>
                          <div style={{fontSize:9,color:"#475569",marginTop:1}}>This sets it as the opening balance for next cycle</div>
                        </div>
                        <button onClick={()=>{if(confirm(`Carry forward ${fmt(net)} to ${nextMonth} as opening balance?`)){carryForwardBalance(month,nextMonth,net);}}} 
                          style={{padding:"5px 12px",background:"#10b98120",border:"1px solid #10b98140",borderRadius:7,color:"#10b981",fontSize:10,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>
                          ➡️ Carry Forward
                        </button>
                      </div>
                    );
                  })()}
                  {(()=>{
                    const prevIdx=months.indexOf(month)-1;
                    if(prevIdx<0)return null;
                    const prev=calcMonth(transactions,months[prevIdx]);
                    const expDiff=expenses-prev.expenses;
                    const incDiff=income-prev.income;
                    return(
                      <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1e1e38",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                        <div style={{background:"#0d0d20",borderRadius:8,padding:"8px 10px"}}>
                          <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>vs LAST CYCLE — INCOME</div>
                          <div style={{fontSize:11,fontWeight:700,color:incDiff>=0?"#10b981":"#ef4444"}}>{incDiff>=0?"+":""}{fmt(incDiff)}</div>
                        </div>
                        <div style={{background:"#0d0d20",borderRadius:8,padding:"8px 10px"}}>
                          <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>vs LAST CYCLE — EXPENSES</div>
                          <div style={{fontSize:11,fontWeight:700,color:expDiff<=0?"#10b981":"#ef4444"}}>{expDiff>=0?"+":""}{fmt(expDiff)}</div>
                        </div>
                      </div>
                    );
                  })()}
                </Card>
              )}

              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc"}}>Expense Breakdown — {month}</div>
                  <span style={{fontSize:10,color:"#475569"}}>Click to drill down · ✏️ reclassify · 🗑️ delete</span>
                </div>
                {income>0&&expenses/income>0.9&&(
                  <div style={{background:"#2a0a0a",border:"1px solid #ef444440",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#fca5a5"}}>
                    ⚠️ Warning: You spent {(expenses/income*100).toFixed(0)}% of your income this cycle. Target is below 80%.
                  </div>
                )}
                {/* Top 3 biggest transactions */}
                {(()=>{
                  const top3=transactions.filter(t=>t.month===month&&t.cat!=="income").sort((a,b)=>b.amount-a.amount).slice(0,3);
                  if(top3.length===0)return null;
                  const catMap=Object.fromEntries(cats.map(c=>[c.id,c]));
                  return(
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#f59e0b",marginBottom:8}}>🔥 Top 3 Biggest Transactions This Cycle</div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {top3.map((t,i)=>{
                          const cat=catMap[t.cat]||{color:"#94a3b8",label:t.cat};
                          return(
                            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:darkMode?"#0d0d20":"#f8fafc",borderRadius:8,border:`1px solid ${cat.color}30`}}>
                              <div style={{fontSize:16,fontWeight:900,color:i===0?"#f59e0b":i===1?"#94a3b8":"#cd7c2f",minWidth:20}}>#{i+1}</div>
                              <div style={{flex:1}}>
                                <div style={{fontSize:11,color:"#e2e8f0",fontWeight:600}}>{t.desc}</div>
                                <div style={{display:"flex",gap:8,marginTop:2}}>
                                  <span style={{fontSize:9,color:"#64748b"}}>📅 {t.date}</span>
                                  <span style={{fontSize:9,fontWeight:600,padding:"1px 6px",borderRadius:8,background:cat.color+"18",color:cat.color}}>{cat.label}</span>
                                </div>
                              </div>
                              <div style={{fontSize:13,fontWeight:800,color:cat.color}}>{fmt(t.amount)}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
                <div style={{height:1,background:"#1e1e3a",margin:"8px 0 12px"}}/>
                {[...expCats].sort((a,b)=>(byCat[b.id]||0)-(byCat[a.id]||0)).map(cat=>{
                  const amt=byCat[cat.id]||0;if(!amt)return null;
                  const pct=expenses>0?(amt/expenses*100):0;
                  const count=transactions.filter(t=>t.month===month&&t.cat===cat.id).length;
                  const budget=budgets[cat.id]||0;const over=budget>0&&amt>budget;
                  return(
                    <div key={cat.id} onClick={()=>setDrill(cat.id)}
                      style={{marginBottom:11,padding:"7px 9px",borderRadius:9,cursor:"pointer",border:`1px solid ${over?"#ef444428":"transparent"}`}}
                      onMouseEnter={e=>e.currentTarget.style.background="#0d0d20"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,color:"#cbd5e1"}}>{cat.label}</span>
                          <Tag color={cat.color}>{count} item{count!==1?"s":""}</Tag>
                          {over&&<Tag color="#ef4444">⚠️ Over budget</Tag>}
                          {budget>0&&!over&&<Tag color="#10b981">✓ {fmt(budget-amt)} left</Tag>}
                        </div>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <span style={{fontSize:10,color:"#64748b"}}>{pct.toFixed(1)}%</span>
                          <span style={{fontSize:12,fontWeight:700,color:over?"#ef4444":cat.color}}>{fmt(amt)}</span>
                          <span style={{fontSize:10,color:"#475569"}}>›</span>
                        </div>
                      </div>
                      <div style={{background:"#0a0a18",borderRadius:20,height:5}}>
                        <div style={{height:"100%",borderRadius:20,width:`${pct}%`,background:over?"#ef4444":cat.color}}/>
                      </div>
                      {budget>0&&(
                        <div style={{marginTop:3,display:"flex",alignItems:"center",gap:6}}>
                          <div style={{background:"#0a0a18",borderRadius:20,height:3,flex:1,overflow:"hidden"}}>
                            <div style={{height:"100%",borderRadius:20,width:`${Math.min(100,(amt/budget)*100)}%`,background:over?"#ef4444":"#10b981"}}/>
                          </div>
                          <span style={{fontSize:9,color:"#64748b",whiteSpace:"nowrap"}}>Budget: {fmt(budget)}</span>
                        </div>
                      )}
                    </div>
                  );
                })}
                {expCats.every(c=>!byCat[c.id])&&<div style={{textAlign:"center",color:"#475569",padding:20}}>No expense data. Upload a statement or add entries manually.</div>}
              </Card>
            </div>
          )}

          {tab==="trends"&&(
            <div>
              <TrendChart transactions={transactions}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc"}}>Month-by-Month Summary</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <select value={exportMonth} onChange={e=>setExportMonth(e.target.value)} style={{...inp,width:"auto",fontSize:11}}>
                    <option value="all">All months</option>{months.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                  <Btn onClick={()=>exportCSV(transactions,cats,exportMonth)} style={{padding:"7px 14px",fontSize:11}}>📤 Export CSV</Btn>
                </div>
              </div>
              {sortMonths(months).map(mk=>{
                const{income,byCat,expenses}=calcMonth(transactions,mk);const net=income-expenses;
                return(
                  <Card key={mk} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <span style={{fontWeight:700,color:"#e2e8f0",fontSize:13}}>{mk}</span>
                      <span style={{fontSize:12,fontWeight:700,color:net>=0?"#10b981":"#ef4444"}}>Net: {fmt(net)}</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      {[["INCOME",income,"#10b981"],["EXPENSES",expenses,"#ef4444"]].map(([label,val,color])=>(
                        <div key={label}><div style={{fontSize:9,color:"#64748b",marginBottom:3}}>{label}</div>
                          <div style={{background:"#0d0d20",borderRadius:7,height:24,overflow:"hidden"}}>
                            <div style={{height:"100%",background:color,display:"flex",alignItems:"center",paddingLeft:8,width:"100%"}}>
                              <span style={{fontSize:11,fontWeight:700,color:"#fff"}}>{fmt(val)}</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {cats.filter(c=>c.type==="expense"&&byCat[c.id]).map(c=>(
                        <span key={c.id} style={{fontSize:9,fontWeight:600,padding:"2px 8px",borderRadius:10,background:c.color+"18",color:c.color,border:`1px solid ${c.color}25`}}>{c.label} {fmt(byCat[c.id])}</span>
                      ))}
                    </div>
                  </Card>
                );
              })}
            </div>
          )}

          {tab==="investments"&&<InvestmentTracker investments={investments} savingsGoals={savingsGoals} invTypes={invTypes} onUpdate={updateInvestments} onUpdateGoals={updateSavingsGoals} onUpdateInvTypes={updateInvTypes}/>}
          {tab==="annual"&&<AnnualSummary transactions={transactions} cats={cats} investments={investments}/>}
          {tab==="networth"&&(
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}}>💎 Net Worth & Financial Health</div>
              <HealthScore transactions={transactions} month={month} investments={investments} debts={debts}/>
              <div style={{marginTop:14}}/>
              <NetWorthTracker transactions={transactions} investments={investments} debts={debts} netWorthHistory={netWorthHistory} onUpdateHistory={updateNetWorthHistory}/>
              <div style={{marginTop:14}}/>
              <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:10}}>💳 Debt Tracker</div>
              <DebtTracker debts={debts} onUpdate={updateDebts}/>
            </div>
          )}
          {tab==="backup"&&(
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:14}}>💾 Backup & Restore</div>
              <BackupRestore state={state} onRestore={restoreBackup}/>
              {uploadHistory.length>0&&(
                <div style={{marginTop:14}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:10}}>📋 Upload History</div>
                  <div style={{background:darkMode?"#111126":"#fff",borderRadius:14,padding:"16px 18px",border:`1px solid ${darkMode?"#252540":"#e2e8f0"}`}}>
                    <div style={{fontSize:10,color:"#64748b",marginBottom:10}}>Last {uploadHistory.length} uploads</div>
                    {uploadHistory.map(h=>(
                      <div key={h.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${darkMode?"#1a1a38":"#f1f5f9"}`}}>
                        <div>
                          <div style={{fontSize:12,color:"#e2e8f0",fontWeight:500}}>📄 {h.month}</div>
                          <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{h.date} at {h.time}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#10b981"}}>{h.count} transactions</div>
                          {h.dupes>0&&<div style={{fontSize:9,color:"#f59e0b"}}>{h.dupes} duplicate{h.dupes!==1?"s":""} flagged</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
          {tab==="pivot"&&<PivotTable transactions={transactions} cats={cats}/>}
          {tab==="upload"&&<UploadTab apiKey={apiKey} cats={cats} onConfirm={confirmUpload}/>}
        </div>

        <div style={{width:310,flexShrink:0,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <AiChat transactions={transactions} cats={cats} apiKey={apiKey} onSaveKey={saveApiKey} investments={investments} savingsGoals={savingsGoals}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
